name: Build DouyinTV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Display environment info
        run: |
          echo "=== Environment Information ==="
          java -version
          echo ""
          echo "=== System Info ==="
          uname -a
          echo ""
          echo "=== Disk Space ==="
          df -h
          echo ""
          echo "=== Memory Info ==="
          free -h

      - name: Display Gradle properties
        run: |
          echo "=== Gradle Properties ==="
          cat gradle.properties
          echo ""
          echo "=== Gradle Wrapper Properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo ""
          echo "=== Build Configuration ==="
          cat build.gradle.kts
          echo ""
          echo "=== App Build Configuration ==="
          cat app/build.gradle.kts

      - name: Make gradlew executable and fix permissions
        run: |
          chmod +x gradlew
          ls -la gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK with Gradle (Debug mode)
        run: ./gradlew assembleDebug --info --stacktrace --no-daemon --warning-mode=all
        timeout-minutes: 45

      - name: Check build output
        if: always()
        run: |
          echo "=== Build Output Directory ==="
          ls -la app/build/outputs/ || echo "Outputs directory not found"
          echo ""
          echo "=== APK Directory ==="
          ls -la app/build/outputs/apk/debug/ || echo "APK directory not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: DouyinTV-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BuildLogs
          path: |
            app/build/reports/
            build.log
          if-no-files-found: ignore

      - name: Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Job Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY