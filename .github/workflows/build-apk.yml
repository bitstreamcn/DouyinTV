name: Build DouyinTV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Display environment info
        run: |
          echo "=== Environment Information ==="
          java -version
          echo ""
          echo "=== System Info ==="
          uname -a
          echo ""
          echo "=== Disk Space ==="
          df -h
          echo ""
          echo "=== Memory Info ==="
          free -h

      - name: Display Gradle properties
        run: |
          echo "=== Gradle Properties ==="
          cat gradle.properties
          echo ""
          echo "=== Gradle Wrapper Properties ==="
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --info --stacktrace --no-daemon
        timeout-minutes: 30

      - name: Check build output
        run: |
          echo "=== Build Output ==="
          ls -la app/build/outputs/apk/debug/ || echo "APK directory not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: DouyinTV-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BuildLogs
          path: |
            app/build/reports/
            build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Job Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY